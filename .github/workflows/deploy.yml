# Deploys the DSF Unified Model Simulator to GitHub Pages on every push to main.
# Build: artifacts/dsf-simulator (Vite; PORT/BASE_PATH are required by its config).
# The Pages site is created automatically on first run (enablement: true).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile --filter "./artifacts/dsf-simulator..."
      - name: Build
        run: pnpm run build
        working-directory: artifacts/dsf-simulator
        env:
          PORT: "3001"
          BASE_PATH: /DSF-Simulator/
      - name: SPA fallback (deep links)
        run: cp artifacts/dsf-simulator/dist/public/index.html artifacts/dsf-simulator/dist/public/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/dsf-simulator/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
